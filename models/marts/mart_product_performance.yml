version: 2

models:
  - name: mart_product_performance
    description: "One row per product summarizing product sales performance."

    columns:
      - name: item_id
        description: "Unique identifier for each product."
        tests:
          - unique
          - not_null

      - name: item_name
        description: "Name of the product."
        tests:
          - not_null

      - name: total_item_revenue
        description: "Total revenue generated by the product."

      - name: total_transactions
        description: "Number of transactions containing the product."

      - name: first_purchase_date
        description: "Date of the first recorded purchase."

      - name: last_purchase_date
        description: "Date of the most recent recorded purchase."

      - name: average_product_price
        description: "Average selling price of the product."